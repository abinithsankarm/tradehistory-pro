<!DOCTYPE html>
<html>
<head>
<title>Contact Us</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#0b1020;
    color:white;
    margin:0;
}

.container{
    max-width:700px;
    margin:50px auto;
    background:#151d34;
    padding:30px;
    border-radius:20px;
}

h1{
    color:#00ff88;
    text-align:center;
}

input, textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#00ff88;
    font-weight:bold;
    cursor:pointer;
}

a{
    color:#00ff88;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

<h1>Contact Us</h1>

<input type="text" placeholder="Your Name">

<input type="email" placeholder="Your Email">

<textarea rows="6" placeholder="Your Message"></textarea>

<button onclick="sendMessage()">Send Message</button>

<br><br>

<a href="dashboard.html">← Back to Dashboard</a>

</div>

<script>
function sendMessage(){
    alert("Message Sent Successfully!");
}
</script>

</body>
</html>
